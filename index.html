<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRINTOP - 학원 교재 제작의 새로운 기준</title>
    <link rel="stylesheet" href="/src/index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#F8F9FB] text-[#0F172A] font-sans overflow-x-hidden">
    <div id="app">
      <!-- Header -->
      <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-50">
        <div class="max-w-[1240px] mx-auto px-6 h-20 flex items-center justify-between">
          <div class="flex items-center gap-16">
            <div class="flex items-center gap-3 cursor-pointer group" id="nav-logo">
              <div class="w-10 h-10 bg-brand-blue rounded-xl flex items-center justify-center text-white group-hover:scale-105 transition-all shadow-xl shadow-brand-blue/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/><path d="M8 15h6"/></svg>
              </div>
              <span class="text-2xl font-black tracking-tighter text-slate-900 uppercase italic">Printop</span>
            </div>
            
            <nav class="hidden lg:flex items-center gap-10 text-[13px] font-black uppercase tracking-widest text-slate-400">
               <button data-view="gallery" class="nav-link transition-colors hover:text-brand-blue cursor-pointer">작업 사례</button>
              <button data-view="notice" class="nav-link transition-colors hover:text-brand-blue cursor-pointer">공지사항</button>
              <button data-view="studio" class="nav-link transition-colors hover:text-brand-blue cursor-pointer text-brand-blue">주문하기</button>
              <button data-view="orderLookup" class="nav-link transition-colors hover:text-brand-blue cursor-pointer">주문 조회</button>
              <button data-view="admin" class="nav-link transition-colors hover:text-brand-blue cursor-pointer">관리자 모드</button>
            </nav>
          </div>

          <div class="flex items-center gap-4" id="auth-nav-container">
            <!-- Auth content will be rendered here -->
          </div>
        </div>
      </header>

      <!-- Main Content Container -->
      <main id="main-content">
        <!-- View containers will be rendered here via jQuery -->
      </main>

      <!-- Footer -->
      <footer class="bg-white py-20 border-t border-slate-50">
        <div class="max-w-[1240px] mx-auto px-6 flex flex-col md:flex-row justify-between items-start gap-12">
          <div class="space-y-6">
            <div class="flex items-center gap-2">
              <span class="text-2xl font-black tracking-tighter text-slate-900 uppercase italic">Printop</span>
            </div>
            <p class="text-sm font-medium text-slate-400 max-w-xs leading-relaxed">학원 교재 제작의 모든 과정을 디지털로 혁신합니다. 가장 똑똑한 인쇄 파트너, 프린탑.</p>
          </div>
          <div class="flex flex-wrap gap-x-16 gap-y-8">
            <div class="space-y-4">
              <h4 class="text-[11px] font-black uppercase tracking-widest text-slate-900">약관 및 정책</h4>
              <nav class="flex flex-col gap-2 text-sm font-bold text-slate-400">
                <a href="#" class="hover:text-brand-blue transition-colors">이용약관</a>
                <a href="#" class="hover:text-brand-blue transition-colors">개인정보처리방침</a>
              </nav>
            </div>
            <div class="space-y-4">
              <h4 class="text-[11px] font-black uppercase tracking-widest text-slate-900">고객 지원</h4>
              <nav class="flex flex-col gap-2 text-sm font-bold text-slate-400">
                <a href="#" class="hover:text-brand-blue transition-colors text-slate-900">031-123-4567</a>
                <a href="#" class="hover:text-brand-blue transition-colors">help@printop.com</a>
              </nav>
            </div>
          </div>
        </div>
        <div class="max-w-[1240px] mx-auto px-6 pt-12 mt-12 border-t border-slate-50 text-[10px] font-black text-slate-300 uppercase tracking-widest">
            © 2024 PRINTOP CLOUD STUDIO MADE WITH PRIDE IN KOREA
        </div>
      </footer>
    </div>

    <!-- Floating Support Button -->
    <div class="fixed bottom-8 right-8 z-50 flex flex-col items-end gap-3 group">
      <div class="invisible group-hover:visible opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0 transition-all duration-300 pointer-events-none">
        <div class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl shadow-2xl text-xs font-black tracking-tight whitespace-nowrap mb-2 relative">
          실시간 상담이 필요하신가요?
          <div class="absolute -bottom-1 right-6 w-2 h-2 bg-slate-900 rotate-45"></div>
        </div>
      </div>
      <button class="w-16 h-16 bg-[#0066FF] text-white rounded-[1.5rem] shadow-[0_20px_50px_rgba(0,102,255,0.3)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all cursor-pointer group/btn overflow-hidden relative">
        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover/btn:translate-y-0 transition-transform duration-500"></div>
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="relative z-10"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
      </button>
    </div>

    <!-- Scripts -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
